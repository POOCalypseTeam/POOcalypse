<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../styles/style.css">
    </head>
    <body ondragstart="return false;" ondrop="return false;">
        <div id="point0" style="position:absolute;z-index:1000;background-color:black;width:2px;height:2px;"></div>
        <div id="point1" style="position:absolute;z-index:1000;background-color:blue;width:2px;height:2px;"></div>
        <div id="point2" style="position:absolute;z-index:1000;background-color:magenta;width:2px;height:2px;"></div>
        <div id="point3" style="position:absolute;z-index:1000;background-color:purple;width:2px;height:2px;"></div>
        
        <div id="player">
            <img src="../assets/spritesheets/blonde_man/blonde_man_001.png" alt="player" id="img0">
        </div>

        <p id="action-bar"></p>

        <div id="dialogs">
            <p id="dialog-content"></p>

            <ul id="choices"></ul>
        </div>

        <div id="board">
            <div id="tiles"></div>
        </div>

    </body>
</html>
