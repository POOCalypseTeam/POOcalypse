<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../styles/editor.css">
        
        <title>Editor</title>
    </head>
    <body ondragstart="return false;" ondrop="return false;">
        
        <div id="board" class="grid-background">
            <div id="tiles">
                <div id="select_corners">
                    <img src="../assets/misc/select_corner_1.png" class="corner hidden" id="corner-1">
                    <img src="../assets/misc/select_corner_2.png" class="corner hidden" id="corner-2">
                </div>
            </div>
        </div>

        <ul id="tools">
            <li class="tool tool-selected" onclick="tool(this, 'draw');">🖌️</li>
            <li class="tool" onclick="tool(this, 'erase');">🧼</li>
            <li class="tool" onclick="tool(this, 'select');">🔳</li>
            <br>
            <li class="tool" onclick="hideBackground()">🪟</li>
        </ul>

        <div id="tileset">
        </div>

        <div id="world-info">
            <select name="world-choice" id="world">
                <option disabled selected value>-- Select a world --</option>
            </select>

            <h2>Couches</h2>

            <div id="layers">
            </div>

            <div id="layer-options">

                <div id="tileset-form">
                    <label class="layer-option-label" for="tileset-choice">Tileset: </label>
                    <select name="tileset-choice" id="tileset-choice"></select>    
                </div>
    
                <div id="index-form">
                    <label class="layer-option-label" for="index">Index: </label>
                    <input type="number" name="index" id="index" value="0">
                </div>
    
                <div id="size-form">
                    <label class="layer-option-label" for="tile_size">Tiles size: </label>
                    <input type="number" name="tile_size" id="tile_size" value="16" min="1">
                </div>
    
                <div id="collisions-form">
                    <label class="layer-option-label" for="collisions">Collisions: </label>
                    <input type="checkbox" name="collisions" id="collisions" value="false">
                </div>

                <button id="add">Ajouter</button>
                
            </div>    

        </div>    

        <script src="../scripts/editor.js"></script>
    </body>
</html>
